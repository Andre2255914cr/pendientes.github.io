<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ERCONNECT · Andree - Ing. Preventa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          purple: { DEFAULT: '#6B21E8', dark: '#4C0FBF', light: '#8B5CF6', soft: '#EDE9FE' },
          lime: '#C8F135',
          card: '#F8F7FF',
        },
        fontFamily: {
          display: ['Syne', 'sans-serif'],
          body: ['DM Sans', 'sans-serif'],
        }
      }
    }
  }
</script>
<style>
  :root {
    --purple: #6B21E8;
    --purple-dark: #4C0FBF;
    --purple-light: #8B5CF6;
    --purple-soft: #EDE9FE;
    --lime: #C8F135;
    --white: #FFFFFF;
    --gray-50: #F8F7FF;
    --gray-100: #F1EFFF;
    --gray-200: #DDD8F5;
    --gray-500: #7B72A9;
    --gray-700: #3D3466;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #F0EEF9;
    color: #1A1040;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--purple-dark);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(76,15,191,0.25);
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-img {
    width: 36px;
    height: 36px;
    border-radius: 8px;
  }

  .brand-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    color: var(--lime);
    letter-spacing: 0.08em;
  }

  .header-divider {
    width: 1px;
    height: 28px;
    background: rgba(255,255,255,0.2);
  }

  .header-subtitle {
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    font-size: 0.875rem;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.02em;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Dashboard Stats */
  .stats-bar {
    background: white;
    padding: 1rem 2rem;
    display: flex;
    gap: 1rem;
    align-items: stretch;
    box-shadow: 0 1px 0 rgba(107,33,232,0.08);
    flex-wrap: wrap;
  }

  .stat-card {
    flex: 1;
    min-width: 140px;
    border-radius: 12px;
    padding: 0.9rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    right: -10px;
    top: -10px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    opacity: 0.12;
  }

  .stat-alta { background: #FFF1F1; border: 1.5px solid #FFCDD2; }
  .stat-alta::before { background: #EF4444; }
  .stat-alta .stat-num { color: #DC2626; }
  .stat-alta .stat-dot { background: #EF4444; }

  .stat-media { background: #FFFBEB; border: 1.5px solid #FDE68A; }
  .stat-media::before { background: #F59E0B; }
  .stat-media .stat-num { color: #D97706; }
  .stat-media .stat-dot { background: #F59E0B; }

  .stat-baja { background: #F0FDF4; border: 1.5px solid #BBF7D0; }
  .stat-baja::before { background: #22C55E; }
  .stat-baja .stat-num { color: #16A34A; }
  .stat-baja .stat-dot { background: #22C55E; }

  .stat-completados { background: var(--purple-soft); border: 1.5px solid #C4B5FD; }
  .stat-completados::before { background: var(--purple); }
  .stat-completados .stat-num { color: var(--purple-dark); }
  .stat-completados .stat-dot { background: var(--purple); }

  .stat-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .stat-info { display: flex; flex-direction: column; }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    line-height: 1;
  }

  .stat-label {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--gray-500);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  /* Main layout */
  .main-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 1.5rem;
    align-items: start;
  }

  @media (max-width: 1024px) {
    .main-container { grid-template-columns: 1fr; padding: 1rem; }
    .stats-bar { padding: 0.8rem 1rem; }
  }

  /* Form Panel */
  .form-panel {
    background: white;
    border-radius: 20px;
    padding: 1.75rem;
    box-shadow: 0 4px 24px rgba(107,33,232,0.08);
    position: sticky;
    top: 80px;
  }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--purple-dark);
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title svg { color: var(--purple); }

  .form-group { margin-bottom: 0.9rem; }

  label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--gray-500);
    margin-bottom: 4px;
  }

  input[type="text"],
  input[type="date"],
  input[type="number"],
  select,
  textarea {
    width: 100%;
    background: var(--gray-50);
    border: 1.5px solid var(--gray-200);
    border-radius: 10px;
    padding: 0.6rem 0.85rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    color: #1A1040;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--purple-light);
    box-shadow: 0 0 0 3px rgba(107,33,232,0.1);
  }

  textarea { resize: vertical; min-height: 70px; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  /* Slider */
  .slider-wrap { display: flex; align-items: center; gap: 10px; }
  input[type="range"] {
    flex: 1; accent-color: var(--purple);
    height: 4px; cursor: pointer;
    background: var(--gray-200);
    border: none;
    border-radius: 2px;
    padding: 0;
  }
  .slider-val {
    min-width: 40px; text-align: right;
    font-weight: 700; font-size: 0.875rem;
    color: var(--purple);
  }

  /* Buttons */
  .btn-primary {
    width: 100%;
    background: var(--purple);
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.04em;
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    margin-top: 0.5rem;
  }

  .btn-primary:hover {
    background: var(--purple-dark);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(107,33,232,0.35);
  }

  .btn-primary:active { transform: translateY(0); }

  .btn-export {
    display: flex; align-items: center; gap: 6px;
    background: white;
    color: var(--purple);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.04em;
    padding: 0.55rem 1rem;
    border: 2px solid var(--purple);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-export:hover {
    background: var(--purple);
    color: white;
  }

  /* Cards panel */
  .cards-panel { display: flex; flex-direction: column; gap: 1rem; }

  .cards-toolbar {
    background: white;
    border-radius: 14px;
    padding: 0.85rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    box-shadow: 0 2px 12px rgba(107,33,232,0.06);
  }

  .toolbar-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--gray-500);
    white-space: nowrap;
  }

  .filter-select {
    flex: 1; min-width: 140px;
    padding: 0.45rem 0.75rem;
    border-radius: 8px;
    border: 1.5px solid var(--gray-200);
    font-size: 0.85rem;
    color: #1A1040;
    background: var(--gray-50);
    outline: none;
  }

  .count-badge {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    background: var(--purple-soft);
    color: var(--purple);
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* Project Cards */
  .cards-list { display: flex; flex-direction: column; gap: 0.85rem; }

  .project-card {
    background: white;
    border-radius: 16px;
    padding: 1.2rem 1.4rem;
    box-shadow: 0 2px 12px rgba(107,33,232,0.06);
    border-left: 4px solid transparent;
    transition: box-shadow 0.2s, transform 0.15s;
    position: relative;
  }

  .project-card:hover {
    box-shadow: 0 6px 24px rgba(107,33,232,0.12);
    transform: translateY(-1px);
  }

  .card-prio-alta { border-left-color: #EF4444; }
  .card-prio-media { border-left-color: #F59E0B; }
  .card-prio-baja { border-left-color: #22C55E; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
  }

  .card-title-area { flex: 1; }

  .card-cliente {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--purple);
    margin-bottom: 2px;
  }

  .card-tarea {
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: #1A1040;
    line-height: 1.3;
  }

  .badge {
    display: inline-flex; align-items: center;
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .badge-alta { background: #FEE2E2; color: #B91C1C; }
  .badge-media { background: #FEF3C7; color: #92400E; }
  .badge-baja { background: #DCFCE7; color: #166534; }
  .badge-pendiente { background: #F3F4F6; color: #4B5563; }
  .badge-progreso { background: #DBEAFE; color: #1D4ED8; }
  .badge-completado { background: var(--purple-soft); color: var(--purple-dark); }

  .card-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem 1rem;
    margin-bottom: 0.75rem;
    font-size: 0.8rem;
    color: var(--gray-500);
  }

  @media (max-width: 640px) {
    .card-body { grid-template-columns: 1fr; }
  }

  .card-field { display: flex; flex-direction: column; gap: 1px; }
  .card-field-label {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--gray-200);
    color: #B0A8D4;
  }
  .card-field-val { color: #3D3466; font-size: 0.82rem; }
  .card-field-val.overdue { color: #DC2626; font-weight: 700; }

  .progress-wrap { margin-bottom: 0.65rem; }
  .progress-header { display: flex; justify-content: space-between; font-size: 0.72rem; margin-bottom: 4px; color: var(--gray-500); font-weight: 500; }
  .progress-bar-bg { background: var(--gray-100); border-radius: 99px; height: 6px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--purple-light), var(--purple)); transition: width 0.5s ease; }

  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }

  .btn-delete {
    background: none;
    border: 1.5px solid #FECACA;
    color: #EF4444;
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 4px;
  }

  .btn-delete:hover { background: #FEE2E2; border-color: #EF4444; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--gray-500);
  }
  .empty-state svg { margin: 0 auto 1rem; opacity: 0.3; }
  .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: #3D3466; margin-bottom: 4px; }
  .empty-state p { font-size: 0.85rem; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 1.5rem; right: 1.5rem;
    background: var(--purple-dark);
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.875rem;
    padding: 0.75rem 1.25rem;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(76,15,191,0.35);
    transform: translateY(80px);
    opacity: 0;
    transition: transform 0.35s cubic-bezier(.175,.885,.32,1.275), opacity 0.3s;
    z-index: 999;
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 3px; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo-area">
    <img src="erconnect_icono.png" alt="ERCONNECT" class="logo-img" onerror="this.style.display='none'">
    <span class="brand-name">ERCONNECT</span>
    <div class="header-divider"></div>
    <span class="header-subtitle">Andree · Ing. Preventa</span>
  </div>
  <div class="header-actions">
    <button class="btn-export" onclick="exportCSV()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Exportar CSV
    </button>
  </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat-card stat-alta">
    <div class="stat-dot"></div>
    <div class="stat-info">
      <span class="stat-num" id="cnt-alta">0</span>
      <span class="stat-label">Prioridad Alta</span>
    </div>
  </div>
  <div class="stat-card stat-media">
    <div class="stat-dot"></div>
    <div class="stat-info">
      <span class="stat-num" id="cnt-media">0</span>
      <span class="stat-label">Prioridad Media</span>
    </div>
  </div>
  <div class="stat-card stat-baja">
    <div class="stat-dot"></div>
    <div class="stat-info">
      <span class="stat-num" id="cnt-baja">0</span>
      <span class="stat-label">Prioridad Baja</span>
    </div>
  </div>
  <div class="stat-card stat-completados">
    <div class="stat-dot"></div>
    <div class="stat-info">
      <span class="stat-num" id="cnt-comp">0</span>
      <span class="stat-label">Completados</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main-container">

  <!-- FORM PANEL -->
  <aside class="form-panel">
    <div class="panel-title">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Nuevo Proyecto
    </div>

    <div class="form-group">
      <label>Cliente / Empresa</label>
      <input type="text" id="f-cliente" placeholder="Ej: BBVA, Cemex, Telmex…">
    </div>

    <div class="form-group">
      <label>Tarea / Acción</label>
      <input type="text" id="f-tarea" placeholder="¿Qué hay que hacer?">
    </div>

    <div class="form-group">
      <label>Notas / Contexto</label>
      <textarea id="f-notas" placeholder="Antecedentes, stakeholders, links…"></textarea>
    </div>

    <div class="form-group">
      <label>Solución Propuesta</label>
      <textarea id="f-solucion" placeholder="Arquitectura, productos o servicios a proponer…"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group" style="margin-bottom:0">
        <label>Prioridad</label>
        <select id="f-prioridad">
          <option value="Alta">🔴 Alta</option>
          <option value="Media" selected>🟡 Media</option>
          <option value="Baja">🟢 Baja</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>Estado</label>
        <select id="f-estado">
          <option value="Pendiente" selected>Pendiente</option>
          <option value="En Progreso">En Progreso</option>
          <option value="Completado">Completado</option>
        </select>
      </div>
    </div>

    <div class="form-group" style="margin-top:0.9rem">
      <label>Fecha Límite</label>
      <input type="date" id="f-fecha">
    </div>

    <div class="form-group">
      <label>Progreso</label>
      <div class="slider-wrap">
        <input type="range" id="f-progreso" min="0" max="100" value="0"
          oninput="document.getElementById('f-progreso-val').textContent = this.value + '%'">
        <span class="slider-val" id="f-progreso-val">0%</span>
      </div>
    </div>

    <button class="btn-primary" onclick="addProject()">
      + Agregar Proyecto
    </button>
  </aside>

  <!-- CARDS PANEL -->
  <section class="cards-panel">

    <div class="cards-toolbar">
      <span class="toolbar-label">Filtrar por:</span>
      <select class="filter-select" id="filter-estado" onchange="renderCards()">
        <option value="">Todos los estados</option>
        <option value="Pendiente">Pendiente</option>
        <option value="En Progreso">En Progreso</option>
        <option value="Completado">Completado</option>
      </select>
      <select class="filter-select" id="filter-prio" onchange="renderCards()">
        <option value="">Todas las prioridades</option>
        <option value="Alta">Alta</option>
        <option value="Media">Media</option>
        <option value="Baja">Baja</option>
      </select>
      <span class="count-badge" id="visible-count">0 proyectos</span>
    </div>

    <div class="cards-list" id="cards-list"></div>
  </section>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toast-msg">Listo</span>
</div>

<script>
  // ─── STATE ───────────────────────────────────────────
  let projects = JSON.parse(localStorage.getItem('erconnect_projects') || '[]');

  function save() {
    localStorage.setItem('erconnect_projects', JSON.stringify(projects));
  }

  // ─── ADD PROJECT ─────────────────────────────────────
  function addProject() {
    const cliente = document.getElementById('f-cliente').value.trim();
    const tarea   = document.getElementById('f-tarea').value.trim();
    if (!cliente || !tarea) {
      showToast('⚠️ Cliente y Tarea son requeridos');
      return;
    }
    const project = {
      id:       Date.now(),
      cliente,
      tarea,
      notas:    document.getElementById('f-notas').value.trim(),
      solucion: document.getElementById('f-solucion').value.trim(),
      prioridad:document.getElementById('f-prioridad').value,
      estado:   document.getElementById('f-estado').value,
      fecha:    document.getElementById('f-fecha').value,
      progreso: parseInt(document.getElementById('f-progreso').value),
      creado:   new Date().toISOString()
    };
    projects.unshift(project);
    save();
    resetForm();
    renderCards();
    updateStats();
    showToast('✅ Proyecto agregado');
  }

  function deleteProject(id) {
    projects = projects.filter(p => p.id !== id);
    save();
    renderCards();
    updateStats();
    showToast('🗑️ Proyecto eliminado');
  }

  // ─── RENDER CARDS ────────────────────────────────────
  function renderCards() {
    const filterE = document.getElementById('filter-estado').value;
    const filterP = document.getElementById('filter-prio').value;

    let filtered = projects.filter(p => {
      if (filterE && p.estado !== filterE) return false;
      if (filterP && p.prioridad !== filterP) return false;
      return true;
    });

    document.getElementById('visible-count').textContent =
      filtered.length + (filtered.length === 1 ? ' proyecto' : ' proyectos');

    const list = document.getElementById('cards-list');

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <svg width="56" height="56" fill="none" stroke="#6B21E8" stroke-width="1.5" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <path d="M8 12h8M12 8v8"/>
          </svg>
          <h3>Sin proyectos aquí</h3>
          <p>Agrega tu primer proyecto o ajusta los filtros.</p>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(p => {
      const today = new Date(); today.setHours(0,0,0,0);
      let fechaDisplay = '';
      let fechaClass = 'card-field-val';
      if (p.fecha) {
        const fd = new Date(p.fecha + 'T00:00:00');
        const options = { day: '2-digit', month: 'short', year: 'numeric' };
        fechaDisplay = fd.toLocaleDateString('es-MX', options);
        if (fd < today && p.estado !== 'Completado') {
          fechaClass += ' overdue';
          fechaDisplay = '⚠️ ' + fechaDisplay + ' (Vencido)';
        }
      } else {
        fechaDisplay = '—';
      }

      const prioKey = p.prioridad.toLowerCase();
      const estadoKey = p.estado === 'En Progreso' ? 'progreso' : p.estado.toLowerCase();
      const estadoLabel = p.estado;
      const prioLabel = p.prioridad;

      return `
      <div class="project-card card-prio-${prioKey}">
        <div class="card-header">
          <div class="card-title-area">
            <div class="card-cliente">${escHtml(p.cliente)}</div>
            <div class="card-tarea">${escHtml(p.tarea)}</div>
          </div>
          <span class="badge badge-${prioKey}">${prioLabel}</span>
        </div>

        <div class="card-body">
          ${p.notas ? `<div class="card-field" style="grid-column:1/-1">
            <span class="card-field-label">Notas</span>
            <span class="card-field-val">${escHtml(p.notas)}</span>
          </div>` : ''}
          ${p.solucion ? `<div class="card-field" style="grid-column:1/-1">
            <span class="card-field-label">Solución propuesta</span>
            <span class="card-field-val">${escHtml(p.solucion)}</span>
          </div>` : ''}
          <div class="card-field">
            <span class="card-field-label">Fecha límite</span>
            <span class="${fechaClass}">${fechaDisplay}</span>
          </div>
          <div class="card-field">
            <span class="card-field-label">Creado</span>
            <span class="card-field-val">${new Date(p.creado).toLocaleDateString('es-MX', {day:'2-digit',month:'short',year:'numeric'})}</span>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-header">
            <span>Progreso</span>
            <span style="color:var(--purple);font-weight:700">${p.progreso}%</span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width:${p.progreso}%"></div>
          </div>
        </div>

        <div class="card-footer">
          <div class="card-tags">
            <span class="badge badge-${estadoKey}">${estadoLabel}</span>
          </div>
          <button class="btn-delete" onclick="deleteProject(${p.id})">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            Eliminar
          </button>
        </div>
      </div>`;
    }).join('');
  }

  // ─── STATS ───────────────────────────────────────────
  function updateStats() {
    document.getElementById('cnt-alta').textContent =
      projects.filter(p => p.prioridad === 'Alta' && p.estado !== 'Completado').length;
    document.getElementById('cnt-media').textContent =
      projects.filter(p => p.prioridad === 'Media' && p.estado !== 'Completado').length;
    document.getElementById('cnt-baja').textContent =
      projects.filter(p => p.prioridad === 'Baja' && p.estado !== 'Completado').length;
    document.getElementById('cnt-comp').textContent =
      projects.filter(p => p.estado === 'Completado').length;
  }

  // ─── EXPORT CSV ──────────────────────────────────────
  function exportCSV() {
    if (projects.length === 0) { showToast('⚠️ No hay datos para exportar'); return; }

    const headers = ['Cliente','Tarea','Notas','Solución','Prioridad','Estado','Fecha','Progreso%','Creado'];
    const rows = projects.map(p => [
      p.cliente, p.tarea, p.notas, p.solucion,
      p.prioridad, p.estado, p.fecha, p.progreso,
      new Date(p.creado).toLocaleDateString('es-MX')
    ].map(v => `"${String(v||'').replace(/"/g,'""')}"`));

    const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `ERCONNECT_Pendientes_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('📥 CSV exportado correctamente');
  }

  // ─── HELPERS ─────────────────────────────────────────
  function resetForm() {
    ['f-cliente','f-tarea','f-notas','f-solucion','f-fecha'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('f-prioridad').value = 'Media';
    document.getElementById('f-estado').value = 'Pendiente';
    document.getElementById('f-progreso').value = 0;
    document.getElementById('f-progreso-val').textContent = '0%';
  }

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ─── INIT ─────────────────────────────────────────────
  renderCards();
  updateStats();
</script>
</body>
</html>
