<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Pendientes - ERCONNECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .er-gradient { background: linear-gradient(135deg, #4c1d95 0%, #6d28d9 100%); }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-[#f8fafc] font-sans">

    <header class="er-gradient text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-6">
            <h1 class="text-2xl font-black tracking-tighter">ERCONNECT</h1>
            <div class="hidden md:block">
                <p class="text-sm font-bold leading-tight">Andree Cordero</p>
                <p class="text-[10px] text-purple-200 uppercase tracking-widest">Ingeniero en Preventa</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="exportarExcel()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-xl text-xs font-bold transition flex items-center gap-2">
                <i class="fas fa-file-excel"></i> EXCEL
            </button>
            <button onclick="abrirModal()" class="bg-white text-purple-900 hover:bg-purple-50 px-5 py-2 rounded-xl text-xs font-bold transition shadow-md">
                <i class="fas fa-plus mr-2"></i> NUEVO PROYECTO
            </button>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-6">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-5 rounded-3xl card-shadow border-b-4 border-purple-500">
                <p class="text-gray-400 text-[10px] font-black uppercase mb-1">Total Proyectos</p>
                <h3 id="count-total" class="text-3xl font-black text-gray-800">0</h3>
            </div>
            <div class="bg-white p-5 rounded-3xl card-shadow border-b-4 border-amber-400">
                <p class="text-gray-400 text-[10px] font-black uppercase mb-1">En Proceso</p>
                <h3 id="count-proceso" class="text-3xl font-black text-amber-500">0</h3>
            </div>
            <div class="bg-white p-5 rounded-3xl card-shadow border-b-4 border-rose-500">
                <p class="text-gray-400 text-[10px] font-black uppercase mb-1">Urgentes / Alta</p>
                <h3 id="count-urgente" class="text-3xl font-black text-rose-600">0</h3>
            </div>
            <div class="bg-white p-5 rounded-3xl card-shadow border-b-4 border-emerald-500">
                <p class="text-gray-400 text-[10px] font-black uppercase mb-1">Completados</p>
                <h3 id="count-completado" class="text-3xl font-black text-emerald-600">0</h3>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-4 mb-6 items-center justify-between bg-white p-4 rounded-2xl card-shadow">
            <div class="relative w-full md:w-96">
                <i class="fas fa-search absolute left-4 top-3.5 text-gray-300"></i>
                <input type="text" id="buscador" placeholder="Buscar cliente o trámite..." class="w-full pl-12 pr-4 py-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-purple-500 text-sm">
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <select id="filtro-estado" class="flex-1 md:w-48 p-3 bg-gray-50 rounded-xl text-sm outline-none border-none">
                    <option value="Todos">Todos los estados</option>
                    <option value="Pendiente">Pendiente</option>
                    <option value="En Proceso">En Proceso</option>
                    <option value="Completado">Completado</option>
                </select>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] card-shadow overflow-hidden border border-gray-100">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50/50 text-gray-400 text-[10px] uppercase tracking-[0.2em] border-b border-gray-100">
                        <tr>
                            <th class="p-6">Cliente / Empresa</th>
                            <th class="p-6">Tarea y Solución</th>
                            <th class="p-6 text-center">Prioridad</th>
                            <th class="p-6">Progreso</th>
                            <th class="p-6">Fecha Límite</th>
                            <th class="p-6 text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="lista-proyectos" class="text-sm divide-y divide-gray-50"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modal-proyecto" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[2.5rem] w-full max-w-2xl p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-titulo" class="text-2xl font-black text-purple-900 flex items-center gap-3">
                    <i class="fas fa-clipboard-list text-purple-500"></i> Nuevo Proyecto
                </h2>
                <button onclick="cerrarModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <form id="form-proyecto" class="space-y-6">
                <input type="hidden" id="edit-id">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Cliente / Empresa</label>
                        <input type="text" id="cliente" placeholder="Ej: BBVA, Cemex, Telmex..." class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-purple-500 transition" required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Tarea / Acción</label>
                        <input type="text" id="tarea" placeholder="¿Qué hay que hacer?" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-purple-500 transition" required>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Notas / Contexto (Antecedentes)</label>
                    <textarea id="notas" placeholder="Stakeholders, links, antecedentes..." class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-purple-500 h-24 transition"></textarea>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Solución Propuesta (Arquitectura/Productos)</label>
                    <textarea id="solucion" placeholder="Productos o servicios a proponer..." class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-purple-500 h-24 transition"></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Prioridad</label>
                        <select id="prioridad" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                            <option value="Baja">Baja</option>
                            <option value="Media" selected>Media</option>
                            <option value="Alta">Alta</option>
                            <option value="Urgente">Urgente 🔥</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Estado</label>
                        <select id="estado" class="w-full p-4 bg-gray-50 rounded-2xl outline-none text-purple-700 font-bold">
                            <option value="Pendiente">Pendiente</option>
                            <option value="En Proceso">En Proceso</option>
                            <option value="Completado">Completado</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-2">Fecha Límite</label>
                        <input type="date" id="fecha" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
                    </div>
                </div>

                <div class="space-y-4 pt-2">
                    <div class="flex justify-between text-[10px] font-black text-gray-400 uppercase px-2">
                        <span>Progreso del Proyecto</span>
                        <span id="progreso-val">0%</span>
                    </div>
                    <input type="range" id="progreso" min="0" max="100" value="0" class="w-full h-2 bg-gray-100 rounded-lg appearance-none cursor-pointer accent-purple-600" oninput="document.getElementById('progreso-val').innerText = this.value + '%'">
                </div>

                <button type="submit" class="w-full py-5 er-gradient text-white font-black rounded-2xl shadow-xl hover:shadow-purple-200 transition-all transform hover:-translate-y-1">
                    + GUARDAR PROYECTO
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, getDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxbPG2hi6Hxlro7-AvWHy3-H0qE1lThWQ",
            authDomain: "pendientes-andree.firebaseapp.com",
            projectId: "pendientes-andree",
            storageBucket: "pendientes-andree.firebasestorage.app",
            messagingSenderId: "21111410847",
            appId: "1:21111410847:web:5996c7b0ecf99d394052aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "proyectos");

        window.abrirModal = () => {
            document.getElementById('form-proyecto').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('progreso-val').innerText = '0%';
            document.getElementById('modal-titulo').innerHTML = '<i class="fas fa-clipboard-list text-purple-500"></i> Nuevo Proyecto';
            document.getElementById('modal-proyecto').classList.remove('hidden');
        };
        window.cerrarModal = () => document.getElementById('modal-proyecto').classList.add('hidden');

        document.getElementById('form-proyecto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const data = {
                cliente: document.getElementById('cliente').value,
                tarea: document.getElementById('tarea').value,
                notas: document.getElementById('notas').value,
                solucion: document.getElementById('solucion').value,
                prioridad: document.getElementById('prioridad').value,
                estado: document.getElementById('estado').value,
                fecha: document.getElementById('fecha').value,
                progreso: document.getElementById('progreso').value,
                updatedAt: serverTimestamp()
            };

            if(id) {
                await updateDoc(doc(db, "proyectos", id), data);
            } else {
                data.createdAt = serverTimestamp();
                await addDoc(colRef, data);
            }
            cerrarModal();
        });

        window.editar = async (id) => {
            const snap = await getDoc(doc(db, "proyectos", id));
            const d = snap.data();
            document.getElementById('edit-id').value = id;
            document.getElementById('cliente').value = d.cliente;
            document.getElementById('tarea').value = d.tarea;
            document.getElementById('notas').value = d.notas || '';
            document.getElementById('solucion').value = d.solucion || '';
            document.getElementById('prioridad').value = d.prioridad;
            document.getElementById('estado').value = d.estado;
            document.getElementById('fecha').value = d.fecha;
            document.getElementById('progreso').value = d.progreso || 0;
            document.getElementById('progreso-val').innerText = (d.progreso || 0) + '%';
            document.getElementById('modal-titulo').innerHTML = '<i class="fas fa-edit text-blue-500"></i> Editar Proyecto';
            document.getElementById('modal-proyecto').classList.remove('hidden');
        };

        window.completarRapido = (id) => updateDoc(doc(db, "proyectos", id), { estado: 'Completado', progreso: 100 });
        window.borrar = (id) => confirm("¿Eliminar este registro?") && deleteDoc(doc(db, "proyectos", id));

        const q = query(colRef, orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('lista-proyectos');
            list.innerHTML = '';
            let t=0, p=0, u=0, c=0;

            snapshot.forEach(docSnap => {
                const d = docSnap.data();
                const id = docSnap.id;
                t++;
                if(d.estado !== 'Completado') p++;
                if(d.prioridad === 'Urgente' || d.prioridad === 'Alta') u++;
                if(d.estado === 'Completado') c++;

                const prioColor = {
                    'Urgente': 'bg-rose-100 text-rose-600',
                    'Alta': 'bg-orange-100 text-orange-600',
                    'Media': 'bg-indigo-100 text-indigo-600',
                    'Baja': 'bg-slate-100 text-slate-500'
                }[d.prioridad];

                list.innerHTML += `
                    <tr class="group hover:bg-purple-50/30 transition-all">
                        <td class="p-6">
                            <p class="font-black text-purple-900 text-base mb-1">${d.cliente}</p>
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Folio: ${id.substring(0,6)}</p>
                        </td>
                        <td class="p-6 max-w-md">
                            <p class="font-bold text-gray-700 mb-1">${d.tarea}</p>
                            <p class="text-xs text-gray-400 line-clamp-1 italic">${d.solucion || 'Sin solución definida'}</p>
                        </td>
                        <td class="p-6 text-center">
                            <span class="px-3 py-1.5 rounded-xl text-[10px] font-black uppercase ${prioColor}">${d.prioridad}</span>
                        </td>
                        <td class="p-6 w-48">
                            <div class="flex items-center gap-3">
                                <div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
                                    <div class="h-full bg-purple-500 transition-all" style="width: ${d.progreso}%"></div>
                                </div>
                                <span class="text-[10px] font-black text-gray-400">${d.progreso}%</span>
                            </div>
                        </td>
                        <td class="p-6 font-mono text-gray-400 font-bold">${d.fecha || '--'}</td>
                        <td class="p-6 text-right space-x-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="completarRapido('${id}')" class="p-2 text-emerald-500 hover:bg-emerald-50 rounded-lg"><i class="fas fa-check-circle"></i></button>
                            <button onclick="editar('${id}')" class="p-2 text-blue-500 hover:bg-blue-50 rounded-lg"><i class="fas fa-edit"></i></button>
                            <button onclick="borrar('${id}')" class="p-2 text-rose-300 hover:text-rose-500 rounded-lg"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
            document.getElementById('count-total').innerText = t;
            document.getElementById('count-proceso').innerText = p;
            document.getElementById('count-urgente').innerText = u;
            document.getElementById('count-completado').innerText = c;
        });

        window.exportarExcel = () => {
            const table = document.querySelector("table");
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, "Reporte_Preventa_ERCONNECT_Andree.xlsx");
        };
    </script>
</body>
</html>
