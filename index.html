<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andree - Ing. Preventa | Control de Proyectos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        .overdue { color: #EF4444; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .bg-purple-card { background: #fdfaff; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <nav class="bg-white shadow-sm p-4 flex justify-between items-center border-b-4 border-purple-700 sticky top-0 z-40">
        <div class="flex items-center space-x-4">
            <div class="bg-purple-700 text-white px-3 py-1 rounded font-black text-xl tracking-tighter italic">ERCONNECT</div>
            <div class="h-8 w-px bg-gray-200"></div>
            <h1 class="text-lg font-bold text-gray-800 uppercase">Andree <span class="text-purple-600 font-light text-sm">Ing. Preventa</span></h1>
        </div>
        <div class="flex space-x-2">
            <button onclick="exportarCSV()" class="hidden md:flex bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-bold transition items-center">
                <i class="fas fa-file-export mr-2"></i>Reporte CSV
            </button>
            <button onclick="abrirModal()" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-md transition flex items-center">
                <i class="fas fa-plus mr-2"></i>NUEVO PROYECTO
            </button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 text-center">
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-red-500"><p class="text-[10px] font-bold text-gray-400 uppercase">Alta</p><h2 id="dash-alta" class="text-2xl font-black text-gray-800">0</h2></div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-yellow-500"><p class="text-[10px] font-bold text-gray-400 uppercase">Media</p><h2 id="dash-media" class="text-2xl font-black text-gray-800">0</h2></div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500"><p class="text-[10px] font-bold text-gray-400 uppercase">Baja</p><h2 id="dash-baja" class="text-2xl font-black text-gray-800">0</h2></div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-green-500"><p class="text-[10px] font-bold text-gray-400 uppercase">Listos</p><h2 id="dash-listo" class="text-2xl font-black text-gray-800">0</h2></div>
        </div>

        <div class="flex flex-col md:flex-row justify-between gap-4 mb-6">
            <input type="text" id="buscador" onkeyup="renderizarTareas()" placeholder="Buscar cliente o tarea..." class="p-2.5 bg-white border border-gray-200 rounded-lg text-sm focus:ring-purple-500 outline-none w-full md:w-80 shadow-sm transition">
            <select id="filtroEstado" onchange="renderizarTareas()" class="bg-white border border-gray-200 text-gray-700 text-sm rounded-lg p-2.5 shadow-sm font-bold">
                <option value="Todos">Mostrar Todo</option>
                <option value="Pendiente">Pendientes</option>
                <option value="En progreso">En progreso</option>
                <option value="Completado">Completados</option>
            </select>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden overflow-x-auto">
            <table class="w-full text-sm text-left">
                <thead class="text-[11px] text-gray-500 uppercase bg-purple-50 font-bold">
                    <tr>
                        <th class="px-6 py-4">Cliente</th>
                        <th class="px-6 py-4">Tarea / Contexto</th>
                        <th class="px-6 py-4 text-center">Prioridad</th>
                        <th class="px-6 py-4 text-center">Estado</th>
                        <th class="px-6 py-4 text-center">Fecha Límite</th>
                        <th class="px-6 py-4">Progreso</th>
                        <th class="px-6 py-4 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="contenedor-tareas" class="divide-y divide-gray-50"></tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-60 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full p-6 md:p-8 overflow-y-auto max-h-[95vh]">
            <h3 id="modalTitle" class="text-xl font-black text-purple-900 uppercase mb-6">Nuevo Proyecto</h3>
            <form id="formProyecto" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <input type="hidden" id="editId">
                <div class="md:col-span-2"><label class="text-xs font-bold text-gray-500 uppercase">Cliente</label><input type="text" id="cliente" required class="w-full border p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-purple-500"></div>
                <div class="md:col-span-2"><label class="text-xs font-bold text-gray-500 uppercase">Tarea</label><input type="text" id="tarea" required class="w-full border p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-purple-500"></div>
                <div><label class="text-xs font-bold text-gray-500 uppercase">Prioridad</label><select id="prioridad" class="w-full border p-3 rounded-xl bg-gray-50 font-bold"><option value="Alta">ALTA</option><option value="Media" selected>MEDIA</option><option value="Baja">BAJA</option></select></div>
                <div><label class="text-xs font-bold text-gray-500 uppercase">Estado</label><select id="estado" class="w-full border p-3 rounded-xl bg-gray-50 font-bold text-purple-700"><option value="Pendiente">Pendiente</option><option value="En progreso">En progreso</option><option value="Completado">Completado</option></select></div>
                <div><label class="text-xs font-bold text-gray-500 uppercase">Fecha Límite</label><input type="date" id="fecha" required class="w-full border p-3 rounded-xl bg-gray-50"></div>
                <div><label class="text-xs font-bold text-gray-500 uppercase">Progreso %</label><input type="number" id="progreso" min="0" max="100" class="w-full border p-3 rounded-xl bg-gray-50"></div>
                <div class="md:col-span-2"><label class="text-xs font-bold text-gray-500 uppercase">Notas Técnicas</label><textarea id="solucion" rows="3" class="w-full border p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-purple-500"></textarea></div>
                <div class="md:col-span-2 flex justify-end space-x-3 pt-4 border-t">
                    <button type="button" onclick="cerrarModal()" class="text-gray-400 font-bold uppercase text-[10px]">Cancelar</button>
                    <button type="submit" class="bg-purple-600 text-white px-10 py-3 rounded-xl font-bold shadow-lg hover:bg-purple-700 uppercase text-xs tracking-widest">Guardar Sincronización</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxbPG2hi6Hxlro7-AvWHy3-H0qE1lThWQ",
            authDomain: "pendientes-andree.firebaseapp.com",
            projectId: "pendientes-andree",
            storageBucket: "pendientes-andree.firebasestorage.app",
            messagingSenderId: "21111410847",
            appId: "1:21111410847:web:5996c7b0ecf99d394052aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "proyectos");

        window.abrirModal = () => {
            document.getElementById('editId').value = '';
            document.getElementById('modalTitle').innerText = 'Nuevo Proyecto';
            document.getElementById('formProyecto').reset();
            document.getElementById('modal').classList.remove('hidden');
        };
        window.cerrarModal = () => document.getElementById('modal').classList.add('hidden');

        // Función Guardar (Nueva o Editada)
        document.getElementById('formProyecto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const data = {
                cliente: document.getElementById('cliente').value,
                tarea: document.getElementById('tarea').value,
                prioridad: document.getElementById('prioridad').value,
                estado: document.getElementById('estado').value,
                fecha: document.getElementById('fecha').value,
                progreso: parseInt(document.getElementById('progreso').value) || 0,
                solucion: document.getElementById('solucion').value,
                timestamp: new Date().getTime()
            };

            if (id) {
                await updateDoc(doc(db, "proyectos", id), data);
            } else {
                await addDoc(colRef, data);
            }
            cerrarModal();
        });

        // Función para cargar datos en el modal para editar
        window.prepararEdicion = (id) => {
            const t = window.tareasActuales.find(item => item.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('cliente').value = t.cliente;
            document.getElementById('tarea').value = t.tarea;
            document.getElementById('prioridad').value = t.prioridad;
            document.getElementById('estado').value = t.estado;
            document.getElementById('fecha').value = t.fecha;
            document.getElementById('progreso').value = t.progreso;
            document.getElementById('solucion').value = t.solucion;
            document.getElementById('modalTitle').innerText = 'Editar Proyecto';
            document.getElementById('modal').classList.remove('hidden');
        };

        window.eliminarTarea = async (id) => { if(confirm('¿Borrar permanentemente de la nube?')) await deleteDoc(doc(db, "proyectos", id)); };

        onSnapshot(query(colRef, orderBy("timestamp", "desc")), (snapshot) => {
            window.tareasActuales = snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id }));
            renderizarTareas();
        });

        window.renderizarTareas = () => {
            const contenedor = document.getElementById('contenedor-tareas');
            const filtro = document.getElementById('filtroEstado').value;
            const buscar = document.getElementById('buscador').value.toLowerCase();
            const hoy = new Date().toISOString().split('T')[0];
            let counts = { Alta: 0, Media: 0, Baja: 0, Listo: 0 };
            contenedor.innerHTML = '';

            window.tareasActuales.forEach(t => {
                if(t.estado === 'Completado') counts.Listo++; else counts[t.prioridad]++;
                if(filtro !== 'Todos' && t.estado !== filtro) return;
                if(buscar && !(t.cliente.toLowerCase().includes(buscar) || t.tarea.toLowerCase().includes(buscar))) return;

                const overdueClass = (t.fecha < hoy && t.estado !== 'Completado') ? 'overdue' : '';
                const pColor = t.prioridad === 'Alta' ? 'text-red-600 bg-red-50' : (t.prioridad === 'Media' ? 'text-yellow-600 bg-yellow-50' : 'text-blue-600 bg-blue-50');

                contenedor.innerHTML += `
                    <tr class="hover:bg-purple-card transition">
                        <td class="px-6 py-4 font-black text-gray-900 border-b border-gray-50">${t.cliente}</td>
                        <td class="px-6 py-4 border-b border-gray-50"><div class="font-bold text-purple-900">${t.tarea}</div><div class="text-[10px] text-gray-400 truncate w-40">${t.solucion || ''}</div></td>
                        <td class="px-6 py-4 text-center border-b border-gray-50"><span class="px-2 py-1 rounded text-[10px] font-black ${pColor}">${t.prioridad}</span></td>
                        <td class="px-6 py-4 text-center border-b border-gray-50"><span class="text-[10px] font-bold ${t.estado === 'Completado' ? 'text-green-600' : 'text-purple-600 uppercase'}">${t.estado}</span></td>
                        <td class="px-6 py-4 text-center border-b border-gray-50 ${overdueClass} text-xs font-mono">${t.fecha}</td>
                        <td class="px-6 py-4 border-b border-gray-50"><div class="w-20 bg-gray-100 rounded-full h-1.5 mb-1"><div class="bg-purple-600 h-1.5 rounded-full" style="width: ${t.progreso}%"></div></div><span class="text-[9px] font-bold text-gray-400">${t.progreso}%</span></td>
                        <td class="px-6 py-4 text-right border-b border-gray-50 space-x-2">
                            <button onclick="prepararEdicion('${t.id}')" class="text-blue-400 hover:text-blue-600"><i class="fas fa-edit"></i></button>
                            <button onclick="eliminarTarea('${t.id}')" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>`;
            });
            document.getElementById('dash-alta').innerText = counts.Alta; document.getElementById('dash-media').innerText = counts.Media;
            document.getElementById('dash-baja').innerText = counts.Baja; document.getElementById('dash-listo').innerText = counts.Listo;
        };

        window.exportarCSV = () => {
            let csv = "\uFEFFCliente,Tarea,Prioridad,Estado,Fecha,Progreso\n";
            window.tareasActuales.forEach(t => csv += `"${t.cliente}","${t.tarea}","${t.prioridad}","${t.estado}","${t.fecha}","${t.progreso}%"\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "Reporte_Proyectos.csv"; link.click();
        };
    </script>
</body>
</html>
