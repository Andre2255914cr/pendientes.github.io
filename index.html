<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Pendientes - ERCONNECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-indigo-900 text-white p-4 shadow-lg flex justify-between items-center">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold tracking-widest">ERCONNECT</h1>
            <div class="h-8 w-px bg-indigo-700"></div>
            <div>
                <p class="text-sm font-bold leading-none">Andree Cordero</p>
                <p class="text-[10px] text-indigo-300 uppercase tracking-tighter">Ingeniero en Preventa</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="exportarExcel()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition flex items-center gap-2">
                <i class="fas fa-file-excel"></i> EXPORTAR
            </button>
            <button onclick="abrirModal()" class="bg-indigo-500 hover:bg-indigo-400 text-white px-4 py-2 rounded-lg text-sm font-bold transition">
                <i class="fas fa-plus mr-2"></i> NUEVO PROYECTO
            </button>
        </div>
    </header>

    <main class="p-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
                <p class="text-gray-500 text-xs font-bold uppercase">Total</p>
                <h3 id="count-total" class="text-2xl font-black">0</h3>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-yellow-500">
                <p class="text-gray-500 text-xs font-bold uppercase">En Proceso</p>
                <h3 id="count-proceso" class="text-2xl font-black text-yellow-600">0</h3>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-red-500">
                <p class="text-gray-500 text-xs font-bold uppercase">Urgentes</p>
                <h3 id="count-urgente" class="text-2xl font-black text-red-600">0</h3>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-green-500">
                <p class="text-gray-500 text-xs font-bold uppercase">Listos</p>
                <h3 id="count-completado" class="text-2xl font-black text-green-600">0</h3>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 text-gray-400 text-[10px] uppercase tracking-widest border-b">
                    <tr>
                        <th class="p-4">Cliente</th>
                        <th class="p-4">Trámite/Contacto</th>
                        <th class="p-4 text-center">Prioridad</th>
                        <th class="p-4">Estado</th>
                        <th class="p-4">Fecha Límite</th>
                        <th class="p-4 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="lista-proyectos" class="text-sm text-gray-700 divide-y"></tbody>
            </table>
        </div>
    </main>

    <div id="modal-proyecto" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl">
            <h2 id="modal-titulo" class="text-lg font-bold mb-4 text-indigo-900">Registrar Pendiente</h2>
            <form id="form-proyecto" class="space-y-4">
                <input type="hidden" id="edit-id">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Cliente</label>
                    <input type="text" id="cliente" class="w-full p-2 bg-gray-100 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500" required>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Descripción del Trámite</label>
                    <textarea id="tramite" class="w-full p-2 bg-gray-100 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500" rows="2" required></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Prioridad</label>
                        <select id="prioridad" class="w-full p-2 bg-gray-100 rounded-lg outline-none">
                            <option value="Baja">Baja</option>
                            <option value="Media" selected>Media</option>
                            <option value="Alta">Alta</option>
                            <option value="Urgente">Urgente 🔥</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Fecha Límite</label>
                        <input type="date" id="fecha" class="w-full p-2 bg-gray-100 rounded-lg outline-none">
                    </div>
                </div>
                <div class="flex gap-2 pt-4">
                    <button type="button" onclick="cerrarModal()" class="flex-1 py-3 text-gray-500 font-bold hover:bg-gray-50 rounded-lg transition">Cancelar</button>
                    <button type="submit" class="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 transition">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxbPG2hi6Hxlro7-AvWHy3-H0qE1lThWQ",
            authDomain: "pendientes-andree.firebaseapp.com",
            projectId: "pendientes-andree",
            storageBucket: "pendientes-andree.firebasestorage.app",
            messagingSenderId: "21111410847",
            appId: "1:21111410847:web:5996c7b0ecf99d394052aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "proyectos");

        // Funciones de Modal
        window.abrirModal = () => {
            document.getElementById('form-proyecto').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('modal-titulo').innerText = 'Registrar Pendiente';
            document.getElementById('modal-proyecto').classList.remove('hidden');
        };
        window.cerrarModal = () => document.getElementById('modal-proyecto').classList.add('hidden');

        // CRUD
        document.getElementById('form-proyecto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const data = {
                cliente: document.getElementById('cliente').value,
                tramite: document.getElementById('tramite').value,
                prioridad: document.getElementById('prioridad').value,
                fecha: document.getElementById('fecha').value,
                estado: 'En Proceso'
            };

            if(id) {
                await updateDoc(doc(db, "proyectos", id), data);
            } else {
                await addDoc(colRef, data);
            }
            cerrarModal();
        });

        window.editar = async (id) => {
            const docSnap = await getDoc(doc(db, "proyectos", id));
            const data = docSnap.data();
            document.getElementById('edit-id').value = id;
            document.getElementById('cliente').value = data.cliente;
            document.getElementById('tramite').value = data.tramite;
            document.getElementById('prioridad').value = data.prioridad;
            document.getElementById('fecha').value = data.fecha;
            document.getElementById('modal-titulo').innerText = 'Editar Pendiente';
            document.getElementById('modal-proyecto').classList.remove('hidden');
        };

        window.completar = (id) => updateDoc(doc(db, "proyectos", id), { estado: 'Completado' });
        window.borrar = (id) => confirm("¿Eliminar registro?") && deleteDoc(doc(db, "proyectos", id));

        // Renderizado
        onSnapshot(colRef, (snapshot) => {
            const list = document.getElementById('lista-proyectos');
            list.innerHTML = '';
            let t=0, p=0, u=0, c=0;

            snapshot.forEach(d => {
                const data = d.data();
                const id = d.id;
                t++;
                if(data.estado === 'En Proceso') p++;
                if(data.prioridad === 'Urgente') u++;
                if(data.estado === 'Completado') c++;

                const colorPrio = {
                    'Urgente': 'bg-red-100 text-red-600',
                    'Alta': 'bg-orange-100 text-orange-600',
                    'Media': 'bg-blue-100 text-blue-600',
                    'Baja': 'bg-gray-100 text-gray-500'
                }[data.prioridad];

                list.innerHTML += `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-4 font-bold text-indigo-900">${data.cliente}</td>
                        <td class="p-4 text-gray-600">${data.tramite}</td>
                        <td class="p-4 text-center">
                            <span class="px-2 py-1 rounded-md text-[10px] font-black uppercase ${colorPrio}">${data.prioridad}</span>
                        </td>
                        <td class="p-4 text-[10px] font-bold text-gray-400 uppercase">${data.estado}</td>
                        <td class="p-4 font-mono text-gray-400">${data.fecha || '--'}</td>
                        <td class="p-4 text-right flex justify-end gap-3">
                            <button onclick="completar('${id}')" class="text-green-500 hover:scale-110 transition"><i class="fas fa-check-circle"></i></button>
                            <button onclick="editar('${id}')" class="text-blue-400 hover:scale-110 transition"><i class="fas fa-edit"></i></button>
                            <button onclick="borrar('${id}')" class="text-red-200 hover:text-red-500 transition"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
            document.getElementById('count-total').innerText = t;
            document.getElementById('count-proceso').innerText = p;
            document.getElementById('count-urgente').innerText = u;
            document.getElementById('count-completado').innerText = c;
        });

        // Exportar a Excel
        window.exportarExcel = () => {
            const table = document.querySelector("table");
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, "Pendientes_ERCONNECT_Andree.xlsx");
        };
    </script>
</body>
</html>
