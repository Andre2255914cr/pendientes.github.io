<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Pendientes - Andree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Mis Pendientes - ERCONNECT</h1>
            <button onclick="document.getElementById('modal').classList.remove('hidden')" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                + Nuevo Proyecto
            </button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 text-center">
            <div class="bg-white p-4 rounded-lg shadow"><p class="text-sm text-gray-500">Total</p><p id="count-total" class="text-xl font-bold">0</p></div>
            <div class="bg-white p-4 rounded-lg shadow border-b-4 border-yellow-400"><p class="text-sm text-gray-500">Proceso</p><p id="count-proceso" class="text-xl font-bold">0</p></div>
            <div class="bg-white p-4 rounded-lg shadow border-b-4 border-red-500"><p class="text-sm text-gray-500">Urgentes</p><p id="count-urgente" class="text-xl font-bold">0</p></div>
            <div class="bg-white p-4 rounded-lg shadow border-b-4 border-green-500"><p class="text-sm text-gray-500">Listos</p><p id="count-completado" class="text-xl font-bold">0</p></div>
        </div>

        <div class="bg-white rounded-lg shadow overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="p-4">Cliente</th>
                        <th class="p-4">Trámite</th>
                        <th class="p-4">Prioridad</th>
                        <th class="p-4">Estado</th>
                        <th class="p-4">Fecha</th>
                        <th class="p-4">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-proyectos"></tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-xl w-full max-w-md">
            <h2 class="text-xl font-bold mb-4">Agregar Pendiente</h2>
            <form id="form-nuevo">
                <input type="text" id="cliente" placeholder="Cliente (ej. BUPA)" class="w-full border p-2 mb-3 rounded" required>
                <input type="text" id="tramite" placeholder="¿Qué hay que hacer?" class="w-full border p-2 mb-3 rounded" required>
                <select id="prioridad" class="w-full border p-2 mb-3 rounded">
                    <option value="Baja">Baja</option>
                    <option value="Media" selected>Media</option>
                    <option value="Urgente">Urgente</option>
                </select>
                <input type="date" id="fecha" class="w-full border p-2 mb-4 rounded">
                <div class="flex gap-2">
                    <button type="button" onclick="document.getElementById('modal').classList.add('hidden')" class="w-1/2 bg-gray-200 py-2 rounded">Cerrar</button>
                    <button type="submit" class="w-1/2 bg-blue-600 text-white py-2 rounded">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIGURACIÓN REAL DE TU PROYECTO EARRINGS-ANDREE
        const firebaseConfig = {
            apiKey: "AIzaSyBxbPG2hi6Hxlro7-AvWHy3-H0qE1lThWQ",
            authDomain: "earrings-andree.firebaseapp.com",
            projectId: "earrings-andree",
            storageBucket: "earrings-andree.firebasestorage.app",
            messagingSenderId: "21111410847",
            appId: "1:21111410847:web:5996c7b0ecf99d394052aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "proyectos");

        document.getElementById('form-nuevo').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(colRef, {
                cliente: document.getElementById('cliente').value,
                tramite: document.getElementById('tramite').value,
                prioridad: document.getElementById('prioridad').value,
                fecha: document.getElementById('fecha').value,
                estado: 'En Proceso'
            });
            document.getElementById('form-nuevo').reset();
            document.getElementById('modal').classList.add('hidden');
        });

        onSnapshot(colRef, (snapshot) => {
            const list = document.getElementById('tabla-proyectos');
            list.innerHTML = '';
            let t=0, p=0, u=0, c=0;
            snapshot.forEach(d => {
                const data = d.data();
                t++;
                if(data.estado === 'En Proceso') p++;
                if(data.prioridad === 'Urgente') u++;
                if(data.estado === 'Completado') c++;
                list.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-4 font-semibold">${data.cliente}</td>
                        <td class="p-4">${data.tramite}</td>
                        <td class="p-4"><span class="px-2 py-1 rounded text-xs ${data.prioridad === 'Urgente' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'}">${data.prioridad}</span></td>
                        <td class="p-4 text-sm text-gray-500">${data.estado}</td>
                        <td class="p-4 text-sm">${data.fecha || '-'}</td>
                        <td class="p-4">
                            <button onclick="completar('${d.id}')" class="text-green-600 mr-2"><i class="fas fa-check"></i></button>
                            <button onclick="borrar('${d.id}')" class="text-red-400"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
            document.getElementById('count-total').innerText = t;
            document.getElementById('count-proceso').innerText = p;
            document.getElementById('count-urgente').innerText = u;
            document.getElementById('count-completado').innerText = c;
        });

        window.completar = (id) => updateDoc(doc(db, "proyectos", id), { estado: 'Completado' });
        window.borrar = (id) => confirm("¿Borrar?") && deleteDoc(doc(db, "proyectos", id));
    </script>
</body>
</html>
